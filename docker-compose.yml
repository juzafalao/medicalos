version: '3.9'

services:
  # ── PostgreSQL (para desenvolvimento local)
  postgres:
    image: postgres:16-alpine
    container_name: medicalos-db
    environment:
      POSTGRES_DB: medicalos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: medicalos123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./supabase/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (filas WhatsApp)
  redis:
    image: redis:7-alpine
    container_name: medicalos-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicalos-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medicalos
      DB_USER: postgres
      DB_PASSWORD: medicalos123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret_change_in_prod_32chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev_refresh_secret_change_prod_32
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  # ── Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicalos-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
